<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>List Remote Event — WarpahExploits</title>
<link rel="icon" type="image/png" href="https://res.cloudinary.com/dsjctfzj1/image/upload/v1760351559/IMG-20251007-WA0626_dv8s8r.jpg">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Space Grotesk', sans-serif;
    background: #000000;
    color: #e0e0e0;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 100px 16px 48px;
  }

  .bg-animated {
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at top, #0d2818 0%, #000000 55%);
    z-index: -2;
  }
  .grid-bg {
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,255,136,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,136,0.03) 1px, transparent 1px);
    background-size: 50px 50px;
    z-index: -1;
    animation: gridMove 20s linear infinite;
  }
  @keyframes gridMove { 0%{transform:translateY(0)} 100%{transform:translateY(50px)} }

  #particles { position:fixed; inset:0; z-index:-1; pointer-events:none; }
  .particle {
    position: absolute;
    background: #00ff88;
    border-radius: 50%;
    animation: floatUp linear infinite;
  }
  @keyframes floatUp {
    0%   { transform:translateY(100vh) scale(0); opacity:0; }
    10%  { opacity:1; }
    90%  { opacity:1; }
    100% { transform:translateY(-100vh) scale(1); opacity:0; }
  }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: #000; }
  ::-webkit-scrollbar-thumb { background: linear-gradient(180deg,#00ff88,#00aa55); border-radius:3px; }

  /* HEADER */
  header {
    position: fixed;
    top: 0; width: 100%;
    z-index: 100;
    background: linear-gradient(145deg, rgba(0,255,136,0.05), rgba(0,255,136,0.02));
    backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(0,255,136,0.2);
    box-shadow: 0 8px 32px rgba(0,255,136,0.08);
  }
  nav {
    max-width: 920px;
    margin: 0 auto;
    padding: 12px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .logo-img {
    width: 42px; height: 42px;
    border-radius: 10px;
    object-fit: cover;
    box-shadow: 0 4px 15px rgba(0,255,136,0.3);
  }
  .logo-text {
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: 1.15rem;
    color: #00ff88;
    text-shadow: 0 0 10px #00ff88, 0 0 20px #00ff88;
    animation: glowPulse 2s ease-in-out infinite;
  }
  .logo-sub { font-size: 0.62rem; color: rgba(0,255,136,0.55); letter-spacing:.1em; }
  @keyframes glowPulse {
    0%,100% { text-shadow: 0 0 10px #00ff88, 0 0 20px #00ff88; }
    50%      { text-shadow: 0 0 20px #00ff88, 0 0 40px #00ff88; }
  }
  .header-badge {
    margin-left: auto;
    background: rgba(0,255,136,0.08);
    border: 1px solid rgba(0,255,136,0.25);
    border-radius: 20px;
    padding: 5px 14px;
    font-size: 0.7rem;
    color: #00ff88;
    font-weight: 600;
    letter-spacing:.06em;
    animation: badgeGlow 1.5s ease-in-out infinite;
  }
  @keyframes badgeGlow {
    0%,100% { box-shadow: 0 0 8px rgba(0,255,136,.25); }
    50%      { box-shadow: 0 0 18px rgba(0,255,136,.55); }
  }

  /* PAGE TITLE */
  .page-title {
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: clamp(1.5rem, 5vw, 2.4rem);
    color: #00ff88;
    text-align: center;
    text-shadow: 0 0 10px #00ff88, 0 0 24px #00ff88;
    animation: glowPulse 2s ease-in-out infinite;
    letter-spacing: .1em;
    margin-bottom: 6px;
  }
  .page-sub {
    text-align: center;
    font-size: .84rem;
    color: rgba(0,255,136,.45);
    margin-bottom: 30px;
    letter-spacing: .04em;
  }

  /* GLASS CARD */
  .glass-card {
    background: linear-gradient(145deg, rgba(0,255,136,0.05), rgba(0,255,136,0.02));
    backdrop-filter: blur(10px);
    border: 1px solid rgba(0,255,136,0.2);
    box-shadow: 0 8px 32px rgba(0,255,136,0.08);
    border-radius: 24px;
    width: 100%;
    max-width: 880px;
    padding: 32px;
    transition: box-shadow .3s;
  }
  .glass-card:hover {
    box-shadow: 0 15px 48px rgba(0,255,136,0.14);
    border-color: rgba(0,255,136,0.35);
  }

  /* FORMAT ROW */
  .format-row {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 12px;
    margin-bottom: 24px;
  }
  .format-label {
    font-size: .73rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .14em;
    color: rgba(0,255,136,.7);
  }
  select, input[type="text"] {
    background: rgba(0,0,0,.55);
    border: 1px solid rgba(0,255,136,.2);
    border-radius: 10px;
    color: #d5f0e0;
    font-family: 'Space Grotesk', sans-serif;
    font-size: .82rem;
    padding: 8px 14px;
    outline: none;
    transition: border-color .2s, box-shadow .2s;
    cursor: pointer;
  }
  select:focus, input[type="text"]:focus {
    border-color: rgba(0,255,136,.5);
    box-shadow: 0 0 12px rgba(0,255,136,.15);
  }
  select option { background: #0d2818; }
  input[type="text"] { width: 95px; }

  /* AREAS */
  .areas {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 24px;
  }
  @media(max-width:580px){ .areas { grid-template-columns: 1fr; } }

  .area-wrap > label {
    display: block;
    font-size: .72rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .14em;
    color: #00ff88;
    margin-bottom: 10px;
  }
  .count-badge {
    display: inline-block;
    margin-left: 8px;
    background: rgba(0,255,136,.1);
    border: 1px solid rgba(0,255,136,.25);
    border-radius: 20px;
    padding: 1px 10px;
    font-size: .67rem;
    color: rgba(0,255,136,.8);
    font-weight: 600;
    text-transform: none;
    letter-spacing: 0;
    animation: badgeGlow 1.5s ease-in-out infinite;
  }

  textarea {
    width: 100%;
    height: 230px;
    background: rgba(0,0,0,.6);
    border: 1px solid rgba(0,255,136,.15);
    border-radius: 14px;
    color: #c8e8d5;
    font-family: 'Courier New', monospace;
    font-size: .85rem;
    padding: 16px;
    resize: none;
    outline: none;
    line-height: 1.9;
    transition: border-color .2s, box-shadow .2s;
  }
  textarea:focus {
    border-color: rgba(0,255,136,.4);
    box-shadow: 0 0 18px rgba(0,255,136,.1);
  }
  #output {
    color: #00ff88;
    text-shadow: 0 0 5px rgba(0,255,136,.3);
    cursor: default;
  }

  /* BUTTONS */
  .btn-row { display: flex; gap: 12px; flex-wrap: wrap; }

  .neon-btn-advanced {
    flex: 1;
    position: relative;
    overflow: hidden;
    background: linear-gradient(135deg, #00ff88 0%, #00aa55 100%);
    box-shadow: 0 0 20px rgba(0,255,136,.45);
    border: none;
    border-radius: 14px;
    padding: 14px 24px;
    font-family: 'Orbitron', sans-serif;
    font-weight: 700;
    font-size: .72rem;
    letter-spacing: .1em;
    color: #000;
    cursor: pointer;
    transition: all .25s;
    text-transform: uppercase;
  }
  .neon-btn-advanced span { position: relative; z-index: 1; }
  .neon-btn-advanced:hover {
    transform: translateY(-2px);
    box-shadow: 0 0 32px rgba(0,255,136,.75);
  }

  .btn-ghost {
    background: rgba(0,255,136,.07);
    border: 1px solid rgba(0,255,136,.25);
    border-radius: 14px;
    padding: 14px 22px;
    font-family: 'Orbitron', sans-serif;
    font-weight: 700;
    font-size: .72rem;
    letter-spacing: .1em;
    color: #00ff88;
    cursor: pointer;
    transition: all .25s;
    text-transform: uppercase;
  }
  .btn-ghost:hover {
    background: rgba(0,255,136,.14);
    box-shadow: 0 0 14px rgba(0,255,136,.2);
  }
  .btn-ghost.copied {
    background: rgba(0,255,136,.2);
    border-color: rgba(0,255,136,.6);
    box-shadow: 0 0 18px rgba(0,255,136,.35);
  }

  .btn-clear {
    background: transparent;
    border: 1px solid rgba(255,80,80,.25);
    border-radius: 14px;
    padding: 14px 18px;
    font-family: 'Orbitron', sans-serif;
    font-weight: 700;
    font-size: .72rem;
    letter-spacing: .1em;
    color: rgba(255,120,120,.7);
    cursor: pointer;
    transition: all .25s;
    text-transform: uppercase;
  }
  .btn-clear:hover {
    background: rgba(255,80,80,.1);
    border-color: rgba(255,80,80,.5);
    color: #ff8888;
  }

  /* HINT + FOOTER */
  .hint {
    text-align: center;
    margin-top: 20px;
    font-size: .71rem;
    color: rgba(0,255,136,.3);
    letter-spacing: .04em;
  }
  footer {
    margin-top: 40px;
    text-align: center;
    font-size: .7rem;
    color: rgba(0,255,136,.28);
    letter-spacing: .05em;
  }
  footer span { color: rgba(0,255,136,.5); }
</style>
</head>
<body>

<div class="bg-animated"></div>
<div class="grid-bg"></div>
<div id="particles"></div>

<!-- HEADER -->
<header>
  <nav>
    <img src="https://res.cloudinary.com/dsjctfzj1/image/upload/v1760351559/IMG-20251007-WA0626_dv8s8r.jpg" alt="Logo" class="logo-img">
    <div>
      <div class="logo-text">WarpahExploits</div>
      <div class="logo-sub">List RemoteEvent</div>
    </div>
    <div class="header-badge">🔧 Dev Tools</div>
  </nav>
</header>

<!-- TITLE -->
<h1 class="page-title">LIST REMOTE EVENT</h1>
<p class="page-sub">// ketik item bebas → auto wrap jadi quoted list</p>

<!-- CARD -->
<div class="glass-card">

  <!-- FORMAT SELECTOR -->
  <div class="format-row">
    <span class="format-label">Format :</span>
    <select id="format">
      <option value="double_comma">"item",  — double quote + koma</option>
      <option value="single_comma">'item',  — single quote + koma</option>
      <option value="double_array">["item"] — JS / Python array</option>
      <option value="lua">{"item"} — Lua table</option>
      <option value="custom">✏️ Custom prefix & suffix</option>
    </select>
    <input type="text" id="custom-prefix" placeholder='prefix "' style="display:none">
    <input type="text" id="custom-suffix" placeholder='suffix ",' style="display:none">
  </div>

  <!-- TEXTAREAS -->
  <div class="areas">
    <div class="area-wrap">
      <label>Input — satu item per baris</label>
      <textarea id="input" placeholder="ayam&#10;sapi&#10;kambing&#10;bebek&#10;ikan"></textarea>
    </div>
    <div class="area-wrap">
      <label>Output <span class="count-badge" id="count">0 item</span></label>
      <textarea id="output" readonly placeholder="hasil muncul di sini..."></textarea>
    </div>
  </div>

  <!-- BUTTONS -->
  <div class="btn-row">
    <button class="neon-btn-advanced" onclick="convert()"><span>CONVERT</span></button>
    <button class="btn-ghost" id="copyBtn" onclick="copyOutput()">📋 COPY</button>
    <button class="btn-clear" onclick="clearAll()">✕ CLEAR</button>
  </div>

</div>

<p class="hint">Ketik input → CONVERT → COPY hasil &nbsp;|&nbsp; WarpahExploits Dev Tools</p>

<footer>© 2024 <span>WarpahExploits</span> · Premium Script Hub · 🇮🇩 Made with 💚 in Indonesia</footer>

<script>
  // Particles
  (function(){
    const c = document.getElementById('particles');
    for(let i=0,n=window.innerWidth<600?12:22;i<n;i++){
      const p=document.createElement('div');
      p.className='particle';
      p.style.cssText=`left:${Math.random()*100}%;width:${Math.random()*3+1}px;height:${Math.random()*3+1}px;animation-duration:${Math.random()*10+10}s;animation-delay:${Math.random()*8}s;opacity:${Math.random()*.4+.1}`;
      c.appendChild(p);
    }
  })();

  const fmtSel = document.getElementById('format');
  const pfx    = document.getElementById('custom-prefix');
  const sfx    = document.getElementById('custom-suffix');

  fmtSel.addEventListener('change', () => {
    const custom = fmtSel.value === 'custom';
    pfx.style.display = custom ? 'inline-block' : 'none';
    sfx.style.display = custom ? 'inline-block' : 'none';
    convert();
  });
  document.getElementById('input').addEventListener('input', convert);
  pfx.addEventListener('input', convert);
  sfx.addEventListener('input', convert);

  function convert() {
    const lines = document.getElementById('input').value
      .split('\n').map(l=>l.trim()).filter(l=>l);
    const fmt = fmtSel.value;
    let result = '';
    if      (fmt==='double_comma') result = lines.map(l=>`"${l}",`).join('\n');
    else if (fmt==='single_comma') result = lines.map(l=>`'${l}',`).join('\n');
    else if (fmt==='double_array') result = '[' + lines.map(l=>`"${l}"`).join(', ') + ']';
    else if (fmt==='lua')          result = '{\n'+lines.map(l=>`    "${l}",`).join('\n')+'\n}';
    else if (fmt==='custom') {
      const p=pfx.value, s=sfx.value;
      result = lines.map(l=>`${p}${l}${s}`).join('\n');
    }
    document.getElementById('output').value = result;
    document.getElementById('count').textContent = lines.length+' item';
    const cb=document.getElementById('copyBtn');
    cb.textContent='📋 COPY'; cb.classList.remove('copied');
  }

  function copyOutput() {
    const out = document.getElementById('output').value;
    if(!out) return;
    navigator.clipboard.writeText(out).then(()=>{
      const cb=document.getElementById('copyBtn');
      cb.textContent='✓ COPIED!'; cb.classList.add('copied');
      setTimeout(()=>{ cb.textContent='📋 COPY'; cb.classList.remove('copied'); },2000);
    });
  }

  function clearAll() {
    document.getElementById('input').value='';
    document.getElementById('output').value='';
    document.getElementById('count').textContent='0 item';
  }
</script>
</body>
</html>
